<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car-market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="hero">
        <header>
            <div class="logo">
                <i class="fa-solid fa-car"></i>
                <span>CarHut</span>
            </div>
            <nav class="nav">
                <a href="#">Home <i class="fa-solid fa-chevron-down"></i></a>
                <a href="#">Listings <i class="fa-solid fa-chevron-down"></i></a>
                <a href="#">Blog <i class="fa-solid fa-chevron-down"></i></a>
                <a href="#">Pages <i class="fa-solid fa-chevron-down"></i></a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>
            <div class="header-btns">
                <a href="#" class="sign-in"><i class="fa-regular fa-user"></i> Sign In</a>
            </div>
            <button class="but">Submit Listing</button>
        </header>
        <div class="main">
            <p>Find cars for sale and for rent near you</p>
            <h1>Find Your Perfect Car</h1>
        </div>
        <div class="search-filter-container">
            <div class="filter-tabs">
                <button class="tab active">All</button>
                <button class="tab">New</button>
                <button class="tab">Used</button>
            </div>

            <div class="search-box">
                <div class="search-field">
                    <span class="field-label">Any Makes</span>
                    <i class="fa-solid fa-chevron-down arrow-icon"></i>
                </div>

                <div class="search-field">
                    <span class="field-label">Any Models</span>
                    <i class="fa-solid fa-chevron-down arrow-icon"></i>
                </div>

                <div class="search-field price-field">
                    <span class="price-title">Prices:</span>
                    <span class="field-label">All Prices</span>
                </div>

                <button class="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i> Search Cars
                </button>
            </div>
        </div>
        <div class="mashinla">
            <div class="j">
                <p>Or Browse Featured Mode</p>
            </div>
            <div class="mashinla2">
                <button class="div1">
                    <span><i class="fa-solid fa-car-side"></i></span>
                    <small>Suv</small>
                </button>
                <button class="div1">
                    <span><i class="fa-solid fa-car-side"></i></span>
                    <small>Sedan</small>
                </button>
                <button class="div1">
                    <span><i class="fa-solid fa-car-side"></i></span>
                    <small>Hatchback</small>
                </button>
                <button class="div1">
                    <span><i class="fa-solid fa-car-side"></i></span>
                    <small>Coupe</small>
                </button>
                <button class="div1">
                    <span><i class="fa-solid fa-car-side"></i></span>
                    <small>Hybrid</small>
                </button>
            </div>
        </div>
    </div>
</body>

</html>
